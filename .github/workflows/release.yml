name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.4)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_os: linux
            archive_arch: x86_64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive_os: darwin
            archive_arch: x86_64
            deployment_target: "15.0"
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_os: darwin
            archive_arch: arm64
            deployment_target: "14.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protobuf compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Build retrivio (non-macOS)
        if: runner.os != 'macOS'
        run: cargo build --locked --release --target "${{ matrix.target }}" -p retrivio

      - name: Build retrivio (macOS)
        if: runner.os == 'macOS'
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
        run: cargo build --locked --release --target "${{ matrix.target }}" -p retrivio

      - name: Resolve release tag/version
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ "${tag}" != v* ]]; then
            echo "error: tag must start with 'v' (got '${tag}')" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.release_meta.outputs.version }}"
          package="retrivio-${version}-${{ matrix.archive_os }}-${{ matrix.archive_arch }}"
          mkdir -p "dist/${package}"
          cp "target/${{ matrix.target }}/release/retrivio" "dist/${package}/retrivio"
          chmod +x "dist/${package}/retrivio"
          tar -C dist -czf "${package}.tar.gz" "${package}"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.archive_os }}-${{ matrix.archive_arch }}
          path: "*.tar.gz"
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f -name "*.tar.gz" -exec cp {} release/ \;
          ls -lh release

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: |
            release/*.tar.gz
            release/SHA256SUMS.txt
          generate_release_notes: true
